<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Users</title>
</head>
<body>

<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">
<input type="number" id="age" placeholder="Age">

<label>Graduated:</label>
<select id="isGraduated">
  <option value="true">Yes</option>
  <option value="false">No</option>
</select>

<button id="btn">Add User</button>

<hr>

<input type="text" id="searchFirst" placeholder="Search First Name">
<input type="text" id="searchLast" placeholder="Search Last Name">

<select id="graduationFilter">
  <option value="all">All</option>
  <option value="true">Graduated</option>
  <option value="false">Ungraduated</option>
</select>

<hr>

<table border="1">
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Age</th>
<th>Graduated</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script src="main.js"></script>
</body>
</html>
